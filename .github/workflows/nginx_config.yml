name: Certbot SSL

on:
  workflow_call:
    inputs:
      domain:
        description: "Primary domain (e.g. yourdomain.com)"
        required: true
        type: string
      www:
        description: "Also include www subdomain?"
        required: true
        type: boolean
        default: false
      email:
        description: "Email for Let's Encrypt notifications"
        required: true
        type: string
      backend_port:
        description: "Backend app port (default: 8000)"
        required: false
        default: "8000"
        type: string
      nginx_generator_link:
        description: "File link to nginx generator"
        required: true
        type: string

jobs:
  certbot:
    name: Generate Nginx Config & Issue SSL Certificate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VM host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts   

      - name: Run script & configure Certbot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            DOMAIN="${{ github.event.inputs.domain }}"
            EMAIL="${{ github.event.inputs.email }}"
            INCLUDE_WWW="${{ github.event.inputs.www }}"
            PORT="${{ github.event.inputs.backend_port }}"
            ENABLE_SSL="Y"
            
            # ── Download generate-nginx.sh ────────────────────────────
            echo "📥 Downloading Nginx config generator..."
            wget -O /tmp/generate-nginx.sh "${{ inputs.nginx_generator_link }}"
            chmod +x /tmp/generate-nginx.sh

            # ── Run generate-nginx.sh non-interactively ───────────────
            echo "📝 Generating Nginx config for $DOMAIN..."
            chmod +x /tmp/generate-nginx.sh

            # Feed answers to the interactive prompts via heredoc
            /tmp/generate-nginx.sh "$DOMAIN" "$PORT" "$INCLUDE_WWW" "$ENABLE_SSL" "$EMAIL"
