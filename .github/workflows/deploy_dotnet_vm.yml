name: DEPLOY DOTNET APP TO VM

on:
  workflow_call:
    inputs:
      project_path:
        description: 'Project path'
        type: string
        required: true
      destination_folder:
        description: 'Folder path to upload binaries on server'
        type: string
        required: true
      dotnet_version:
        description: '.NET app version'
        type: string
        default: '10.0'
      configuration:
        description: 'Configuration for building app'
        type: string
        default: 'Release'
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project_path }}

      - name: Build solution
        run: dotnet build ${{ inputs.project_path }} --configuration ${{ inputs.configuration }} --no-restore

      - name: Run tests
        run: dotnet test --configuration ${{ inputs.configuration }} --no-build --verbosity normal

      - name: Publish application
        run: |
          dotnet publish ${{ inputs.project_path }} \
            --configuration ${{ inputs.configuration }} \
            --output ./publish \
            --self-contained false

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VM host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create app directory on VM
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo mkdir -p ${{ inputs.destination_folder }} && \
             sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} ${{ inputs.destination_folder }}"

      - name: Upload published app to VM
        run: |
          rsync -avz -e "ssh" \
            --delete \
            ./publish/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ inputs.destination_folder }}/
